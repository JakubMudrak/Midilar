<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midilar — Patchbay Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #f0efec;
  --bg2:         #e8e7e3;
  --border:      #d4d2ca;
  --border2:     #b8b6ac;
  --text:        #111008;
  --text-dim:    #706f60;
  --text-mute:   #a8a69a;
  --gold:        #8a6010;
  --gold-mid:    #c8a030;
  --gold-light:  #f5edd8;
  --gold-border: #d4a840;
  --nav-bg:      rgba(240,239,236,0.96);
  --red:         #c03030;
  --red-light:   #fdf0f0;
  --red-border:  #e8b0b0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Roboto', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── NAV ── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 50px;
  background: var(--nav-bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  z-index: 100;
  backdrop-filter: blur(6px);
}
.nav-logo { height: 20px; width: auto; display: block; }
.nav-sep { color: var(--border2); font-size: 14px; line-height: 1; }
.nav-sub {
  font-size: 10px;
  letter-spacing: .26em;
  text-transform: uppercase;
  color: var(--text-dim);
  font-weight: 500;
}
.nav-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

/* ── BUTTONS ── */
.btn {
  padding: 6px 14px;
  border-radius: 2px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text-dim);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .18em;
  text-transform: uppercase;
  cursor: pointer;
  font-family: inherit;
  transition: border-color .12s, color .12s, background .12s;
}
.btn:hover { border-color: var(--gold-border); color: var(--gold); background: var(--gold-light); }
.btn-gold { border-color: var(--gold-border); color: var(--gold); background: var(--gold-light); }
.btn-gold:hover { background: #ede4c8; border-color: var(--gold-mid); }
.btn-danger { border-color: var(--red-border); color: #b04040; }
.btn-danger:hover { border-color: var(--red); color: var(--red); background: var(--red-light); }

/* ── MAIN ── */
.main {
  padding: 74px 24px 48px;
  max-width: 1440px;
  width: 100%;
  margin: 0 auto;
}

/* ── SECTION HEADER ── */
.section-header { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
.section-title {
  font-size: 8px; letter-spacing: .34em; text-transform: uppercase;
  font-weight: 700; color: var(--text-mute); white-space: nowrap;
}
.section-line { flex: 1; height: 1px; background: var(--border); }

/* ── LEGEND ── */
.legend { display: flex; align-items: center; gap: 24px; margin-bottom: 20px; flex-wrap: wrap; }
.legend-item {
  display: flex; align-items: center; gap: 7px;
  font-size: 9px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--text-mute); font-weight: 500;
}
.dot-legend {
  width: 9px; height: 9px; border-radius: 50%;
  border: 1px solid var(--border2); background: transparent; flex-shrink: 0;
}
.dot-legend.on { background: var(--gold-mid); border-color: var(--gold-border); }

/* ── PATCHBAY LAYOUT ── */
.patchbay { display: flex; gap: 8px; align-items: stretch; }
.tall-col  { flex: 0 0 165px; display: flex; }
.grid-wrap {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 8px;
  align-content: start;
}

/* ── MODULE CARD ── */
.module-card {
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 10px 10px 9px;
  transition: border-color .12s, box-shadow .12s;
}
.module-card:hover { border-color: var(--border2); box-shadow: 0 1px 6px rgba(0,0,0,.06); }

.module-card-tall {
  width: 100%;
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 10px 10px 9px;
  display: flex;
  flex-direction: column;
  transition: border-color .12s, box-shadow .12s;
}
.module-card-tall:hover { border-color: var(--border2); box-shadow: 0 1px 6px rgba(0,0,0,.06); }

/* ── MOD HEADER ── */
.mod-header {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 8px; padding-bottom: 7px;
  border-bottom: 1px solid var(--border);
}
.mod-num {
  font-size: 8px; letter-spacing: .22em; text-transform: uppercase;
  color: var(--text-mute); font-weight: 700; flex-shrink: 0; min-width: 24px;
}
.mod-id-input {
  flex: 1; font-family: 'Roboto', monospace; font-size: 10px;
  padding: 4px 7px; border: 1px solid var(--border); border-radius: 2px;
  background: var(--bg); color: var(--text); width: 0; letter-spacing: .02em;
  transition: border-color .12s, background .12s;
}
.mod-id-input:focus { outline: none; border-color: var(--gold-border); background: var(--gold-light); }
.mod-id-input::placeholder { color: var(--text-mute); }

/* ── PORTS — 2-col grid for regular, single column list for tall ── */
.ports-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.ports-list  { display: flex; flex-direction: column; gap: 4px; flex: 1; }

/* ── PORT CELL ── */
.port-cell {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 2px; padding: 5px 5px 4px; transition: border-color .12s;
}
.port-cell:hover { border-color: var(--border2); }
.port-top-row { display: flex; align-items: center; margin-bottom: 4px; }
.port-cc-label {
  font-size: 8px; letter-spacing: .14em; color: var(--text-mute);
  font-weight: 700; text-transform: uppercase; flex: 1;
}
.port-dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: transparent; border: 1px solid var(--border2);
  cursor: pointer; flex-shrink: 0; transition: background .12s, border-color .12s;
}
.port-dot:hover { border-color: var(--gold-border); background: var(--gold-light); }
.port-dot.active { background: var(--gold-mid); border-color: var(--gold-border); }

.port-inputs { display: flex; gap: 3px; }
.port-id-input {
  width: 30px; font-size: 10px; padding: 3px 4px;
  border: 1px solid var(--border); border-radius: 2px;
  background: #ffffff; color: var(--text); text-align: center;
  font-family: 'Roboto', monospace; transition: border-color .12s;
  -moz-appearance: textfield;
}
.port-id-input:focus { outline: none; border-color: var(--gold-border); }
.port-id-input::-webkit-outer-spin-button,
.port-id-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

.port-type-select {
  flex: 1; font-size: 9px; padding: 3px 4px;
  border: 1px solid var(--border); border-radius: 2px;
  background: #ffffff; color: var(--text-dim);
  font-family: inherit; font-weight: 700; letter-spacing: .1em;
  cursor: pointer; transition: border-color .12s;
}
.port-type-select:focus { outline: none; border-color: var(--gold-border); }

.port-override { margin-top: 4px; display: none; }
.port-override.show { display: block; }
.port-override-input {
  width: 100%; font-size: 9px; padding: 3px 5px;
  border: 1px solid var(--gold-border); border-radius: 2px;
  background: var(--gold-light); color: var(--gold);
  font-family: 'Roboto', monospace; letter-spacing: .02em;
}
.port-override-input:focus { outline: none; border-color: var(--gold-mid); }
.port-override-input::placeholder { color: var(--gold-mid); opacity: .7; }

/* ── JSON OUTPUT ── */
.json-section { margin-top: 36px; display: none; }
.json-section.show { display: block; }
.json-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.json-label {
  font-size: 8px; letter-spacing: .3em; text-transform: uppercase;
  font-weight: 700; color: var(--text-mute);
}
pre.json-out {
  font-family: 'Roboto Mono', 'Courier New', monospace;
  font-size: 11px; line-height: 1.65;
  background: #ffffff; border: 1px solid var(--border); border-radius: 3px;
  padding: 18px 20px; max-height: 360px; overflow-y: auto;
  color: var(--text); white-space: pre-wrap; word-break: break-all;
}
pre.json-out::-webkit-scrollbar { width: 4px; }
pre.json-out::-webkit-scrollbar-track { background: var(--bg); }
pre.json-out::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 28px; right: 28px;
  background: var(--gold-light); border: 1px solid var(--gold-border);
  color: var(--gold); font-size: 9px; letter-spacing: .22em;
  text-transform: uppercase; font-weight: 700;
  padding: 10px 20px; border-radius: 2px;
  opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 200;
}
.toast.show { opacity: 1; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<nav>
  <svg class="nav-logo" viewBox="0 0 253.16554 51.292313" xmlns="http://www.w3.org/2000/svg">
    <g transform="translate(-263.87615,0.065101)" fill="#111008">
      <path d="m 263.87615,51.227204 0.036,-51.292305 26.08747,25.975927 25.32407,-25.955442 -0.0879,51.27183 z"/>
      <path d="M 324.18164,50.947169 V 0.220762 l 11.57613,-0.0058 v 50.720641 z"/>
      <path d="m 345.34425,0.220725 v 50.632638 l 25.1419,-25.359509 z"/>
      <path d="M 377.4981,50.859145 V 0.22075 l 11.57612,-0.0058 v 50.632638 z"/>
      <path d="M 398.16033,50.857387 V 0.226509 l 11.71178,-0.01151 v 39.090353 h 18.67555 v 11.543986 z"/>
      <path d="M 439.5396,50.847637 455.71886,0.213418 471.89813,50.858965 Z"/>
      <path d="m 482.37455,50.839777 -0.016,-50.634258 24.6897,12.263763 -17.8616,9.849052 27.85505,28.54853 z"/>
    </g>
  </svg>
  <span class="nav-sep">—</span>
  <span class="nav-sub">Patchbay Editor</span>
  <div class="nav-right">
    <button class="btn btn-danger" onclick="clearAll()">Clear all</button>
    <button class="btn" onclick="document.getElementById('import-file').click()">Import JSON</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importJson(event)">
    <button class="btn btn-gold" onclick="exportJson()">Export JSON</button>
  </div>
</nav>

<div class="main">

  <div class="section-header">
    <span class="section-title">Modules — 1 tall (8 ports) + 3 × 5 grid</span>
    <div class="section-line"></div>
  </div>

  <div class="legend">
    <div class="legend-item">
      <div class="dot-legend"></div>
      <span>Dot inactive — uses module ID</span>
    </div>
    <div class="legend-item">
      <div class="dot-legend on"></div>
      <span>Dot active — override moduleId for this port</span>
    </div>
  </div>

  <div class="patchbay">
    <div class="tall-col" id="tall-col"></div>
    <div class="grid-wrap" id="grid"></div>
  </div>

  <div class="json-section" id="json-section">
    <div class="json-toolbar">
      <span class="json-label">Output JSON</span>
      <button class="btn" onclick="copyJson()">Copy</button>
      <button class="btn" onclick="document.getElementById('json-section').classList.remove('show')">Close</button>
    </div>
    <pre class="json-out" id="json-out"></pre>
  </div>

</div>

<div class="toast" id="toast">Copied</div>

<script>
/* ── CC CONFIG ── */
const CC_CONFIG = [
  [60, 62,  56, 59],
  [ 57,  58,  54,  52],
  [50, 49, 37, 39],
  [36, 38, 21, 23],
  [34, 33, 17, 18],
  [63, 61, 26, 25],
  [55, 53, 6, 4],
  [51, 48, 13, 15],
  [35, 32, 10, 9],
  [19, 16, 20, 22],
  [30, 28, 29, 31],
  [24, 27, 7, 5],
  [1, 2, 3, 0],
  [12, 14, 11, 75],
  [8, 74, 72, 73],
];

const TALL_CC_CONFIG = [43, 40, 42, 41, 47, 45, 46, 44];

const PORT_DEFAULTS = [
  { portId: '', portType: 'input'  },
  { portId: '', portType: 'input'  },
  { portId: '', portType: 'output' },
  { portId: '', portType: 'output' },
];

const TALL_PORT_DEFAULTS = [
  { portId: '', portType: 'input'  },
  { portId: '', portType: 'input'  },
  { portId: '', portType: 'input'  },
  { portId: '', portType: 'input'  },
  { portId: '', portType: 'output' },
  { portId: '', portType: 'output' },
  { portId: '', portType: 'output' },
  { portId: '', portType: 'output' },
];

const CHANNEL = 5;
const ROWS = 3, COLS = 5, TOTAL = ROWS * COLS;

const tallModule = {
  moduleId: '',
  ports: TALL_PORT_DEFAULTS.map((p, pi) => ({
    portId: '', portType: p.portType,
    cc: TALL_CC_CONFIG[pi], override: false, overrideId: '',
  })),
};

const modules = Array.from({ length: TOTAL }, (_, i) => ({
  moduleId: '',
  ports: PORT_DEFAULTS.map((p, pi) => ({
    portId: '', portType: p.portType,
    cc: CC_CONFIG[i][pi], override: false, overrideId: '',
  })),
}));

/* ── HELPERS ── */
function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
}

function portCellHTML(p, pi, idxAttr) {
  return `<div class="port-cell">
    <div class="port-top-row">
      <span class="port-cc-label">CC ${p.cc}</span>
      <div class="port-dot${p.override ? ' active' : ''}" data-idx="${idxAttr}" data-pi="${pi}" data-role="dot"></div>
    </div>
    <div class="port-inputs">
      <input class="port-id-input" type="text" value="${esc(p.portId)}" placeholder="id"
        data-idx="${idxAttr}" data-pi="${pi}" data-role="portId">
      <select class="port-type-select" data-idx="${idxAttr}" data-pi="${pi}" data-role="portType">
        <option value="input"  ${p.portType === 'input'  ? 'selected' : ''}>IN</option>
        <option value="output" ${p.portType === 'output' ? 'selected' : ''}>OUT</option>
      </select>
    </div>
    <div class="port-override${p.override ? ' show' : ''}">
      <input class="port-override-input" type="text" placeholder="override id"
        value="${esc(p.overrideId)}" data-idx="${idxAttr}" data-pi="${pi}" data-role="overrideId">
    </div>
  </div>`;
}

/* ── RENDER ── */
function render() {
  const tallCol = document.getElementById('tall-col');
  tallCol.innerHTML = '';
  const tallCard = document.createElement('div');
  tallCard.className = 'module-card-tall';
  tallCard.innerHTML = `
    <div class="mod-header">
      <span class="mod-num">M00</span>
      <input class="mod-id-input" type="text" placeholder="moduleId"
        value="${esc(tallModule.moduleId)}" data-idx="tall" data-role="moduleId">
    </div>
    <div class="ports-list">
      ${tallModule.ports.map((p, pi) => portCellHTML(p, pi, 'tall')).join('')}
    </div>`;
  tallCol.appendChild(tallCard);

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const m = modules[i];
    const card = document.createElement('div');
    card.className = 'module-card';
    card.innerHTML = `
      <div class="mod-header">
        <span class="mod-num">M${String(i + 1).padStart(2, '0')}</span>
        <input class="mod-id-input" type="text" placeholder="moduleId"
          value="${esc(m.moduleId)}" data-idx="${i}" data-role="moduleId">
      </div>
      <div class="ports-grid">
        ${m.ports.map((p, pi) => portCellHTML(p, pi, i)).join('')}
      </div>`;
    grid.appendChild(card);
  }
}

/* ── INPUT EVENTS ── */
document.addEventListener('input', e => {
  const el = e.target;
  const role = el.dataset.role;
  if (!role || !['moduleId','portId','portType','overrideId'].includes(role)) return;
  const pi = +el.dataset.pi;
  if (el.dataset.idx === 'tall') {
    if (role === 'moduleId')   tallModule.moduleId = el.value;
    if (role === 'portId')     tallModule.ports[pi].portId = el.value;
    if (role === 'portType')   tallModule.ports[pi].portType = el.value;
    if (role === 'overrideId') tallModule.ports[pi].overrideId = el.value;
  } else {
    const idx = +el.dataset.idx;
    if (role === 'moduleId')   modules[idx].moduleId = el.value;
    if (role === 'portId')     modules[idx].ports[pi].portId = el.value;
    if (role === 'portType')   modules[idx].ports[pi].portType = el.value;
    if (role === 'overrideId') modules[idx].ports[pi].overrideId = el.value;
  }
});

document.addEventListener('click', e => {
  const el = e.target;
  if (el.dataset.role !== 'dot') return;
  const pi = +el.dataset.pi;
  if (el.dataset.idx === 'tall') {
    tallModule.ports[pi].override = !tallModule.ports[pi].override;
  } else {
    modules[+el.dataset.idx].ports[pi].override = !modules[+el.dataset.idx].ports[pi].override;
  }
  el.classList.toggle('active');
  el.closest('.port-cell').querySelector('.port-override').classList.toggle('show');
});

/* ── JSON ── */
function buildJson() {
  const events = [];
  const push = (p, raw) => {
    const moduleId = raw !== '' && !isNaN(raw) ? +raw : raw;
    const portIdRaw = p.portId.trim();
    const portId = portIdRaw !== '' && !isNaN(portIdRaw) ? +portIdRaw : portIdRaw;
    events.push({ type: 'cable', midi: { channel: CHANNEL, cc: p.cc, ccValue: 1 },
      target: { moduleId, portType: p.portType, portId },
      cableColor: '#0000ff', comment: '' });
  };
  tallModule.ports.forEach(p => {
    push(p, (p.override && p.overrideId.trim()) ? p.overrideId.trim() : tallModule.moduleId.trim());
  });
  modules.forEach(m => m.ports.forEach(p => {
    push(p, (p.override && p.overrideId.trim()) ? p.overrideId.trim() : m.moduleId.trim());
  }));
  return [
    { events: [], driverName: 'MidiCcTwoMessageToggle' },
    { events,     driverName: 'MidiCcTwoMessageGate'   },
  ];
}

function exportJson() {
  document.getElementById('json-out').textContent = JSON.stringify(buildJson(), null, 2);
  const sec = document.getElementById('json-section');
  sec.classList.add('show');
  setTimeout(() => sec.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 30);
}

function copyJson() {
  navigator.clipboard.writeText(JSON.stringify(buildJson(), null, 2))
    .then(() => showToast('Copied')).catch(() => {});
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg || 'Done';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function clearAll() {
  if (!confirm('Clear all module IDs and port values?')) return;
  tallModule.moduleId = '';
  tallModule.ports.forEach((p, pi) => {
    p.portId = ''; p.portType = TALL_PORT_DEFAULTS[pi].portType;
    p.override = false; p.overrideId = '';
  });
  modules.forEach((m, i) => {
    m.moduleId = '';
    m.ports.forEach((p, pi) => {
      p.portId = ''; p.portType = PORT_DEFAULTS[pi].portType;
      p.override = false; p.overrideId = '';
    });
  });
  render();
}

/* ── IMPORT ── */
function importJson(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      const gate = data.find(d => d.driverName === 'MidiCcTwoMessageGate');
      if (!gate || !gate.events) { alert('Invalid JSON — MidiCcTwoMessageGate not found.'); return; }

      tallModule.moduleId = '';
      tallModule.ports.forEach(p => { p.portId = ''; p.override = false; p.overrideId = ''; });
      modules.forEach(m => {
        m.moduleId = '';
        m.ports.forEach(p => { p.portId = ''; p.override = false; p.overrideId = ''; });
      });

      gate.events.forEach(ev => {
        const tIdx = TALL_CC_CONFIG.indexOf(ev.midi.cc);
        if (tIdx !== -1) {
          const p = tallModule.ports[tIdx];
          p.portId = String(ev.target.portId); p.portType = ev.target.portType;
          const id = String(ev.target.moduleId);
          if (tallModule.moduleId === '') tallModule.moduleId = id;
          else if (tallModule.moduleId !== id) { p.override = true; p.overrideId = id; }
          return;
        }
        const mi = CC_CONFIG.findIndex(ccs => ccs.includes(ev.midi.cc));
        if (mi === -1) return;
        const pi = CC_CONFIG[mi].indexOf(ev.midi.cc);
        const m = modules[mi]; const p = m.ports[pi];
        p.portId = String(ev.target.portId); p.portType = ev.target.portType;
        const id = String(ev.target.moduleId);
        if (m.moduleId === '') m.moduleId = id;
        else if (m.moduleId !== id) { p.override = true; p.overrideId = id; }
      });

      render();
      showToast('Imported');
    } catch(err) {
      alert('Could not parse JSON: ' + err.message);
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

render();
</script>
</body>
</html>
